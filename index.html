<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Macro API Debug</title>

<style>
body{
    background:#111;
    color:#eee;
    font-family:Consolas,monospace;
    margin:20px;
}

pre{
    white-space:pre-wrap;
    word-break:break-word;
    border:1px solid #444;
    padding:15px;
    margin-bottom:30px;
    background:#1a1a1a;
}

h2{
    color:#6cf;
}
</style>

</head>
<body>

<div id="results">
Chargement...
</div>

<script>

const base = "https://api.massive.com/";

const headers = {
    Authorization: "Bearer EEf4wWX_lI1pzOTMBCZBmO3j_QKXpm68",
    "Content-Type": "application/json"
};

const endpoints = [

{
    name:"Inflation",
    url:`${base}/fed/v1/inflation?limit=24&sort=date.desc`
},

{
    name:"Labor Market",
    url:`${base}/fed/v1/labor-market?limit=24&sort=date.desc`
},

{
    name:"Treasury Yields",
    url:`${base}/fed/v1/treasury-yields?limit=24&sort=date.desc`
},

{
    name:"Inflation Expectations",
    url:`${base}/fed/v1/inflation-expectations?limit=24&sort=date.desc`
},

{
    name:"Gold (XAUUSD)",
    url:`${base}v2/aggs/ticker/C:XAUUSD/range/1/day/2025-11-03/2030-01-01?adjusted=true&sort=desc&limit=100`
},

{
    name:"Oil (USO)",
    url:`${base}v2/aggs/ticker/USO/range/1/day/2025-11-03/2030-01-01?adjusted=true&sort=desc&limit=100`
},

{
    name:"QQQ",
    url:`${base}v2/aggs/ticker/QQQ/range/1/day/2025-11-03/2030-01-01?adjusted=true&sort=desc&limit=100`
}

];

(async ()=>{

const container=document.getElementById("results");
container.innerHTML="";

const responses=await Promise.allSettled(

    endpoints.map(async endpoint=>{

        const response=await fetch(endpoint.url,{headers});

        const text=await response.text();

        let content=text;

        try{
            content=JSON.stringify(JSON.parse(text),null,2);
        }
        catch(e){
            // Ce n'était pas du JSON, on garde le texte brut.
        }

        return{
            name:endpoint.name,
            status:response.status,
            ok:response.ok,
            url:endpoint.url,
            content
        };

    })

);

responses.forEach(result=>{

    if(result.status==="fulfilled"){

        const r=result.value;

        container.innerHTML+=`
<h2>${r.name}</h2>

<p>
<b>Status :</b> ${r.status}<br>
<b>URL :</b> ${r.url}
</p>

<pre>${r.content}</pre>
`;

    }else{

        container.innerHTML+=`
<h2>Erreur</h2>
<pre>${result.reason}</pre>
`;

    }

});

})();

</script>

</body>
</html>
