<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Macro Data</title>
<style>
    body{
        font-family: monospace;
        background:#111;
        color:#eee;
        margin:20px;
    }
    pre{
        white-space:pre-wrap;
        word-break:break-word;
    }
</style>
</head>
<body>

<pre id="output">Chargement...</pre>

<script>

const base = "https://api.massive.com/";

const headers = {
    Authorization: "Bearer EEf4wWX_lI1pzOTMBCZBmO3j_QKXpm68",
    "Content-Type": "application/json"
};

(async () => {

    const output = document.getElementById("output");

    try {

        const responses = await Promise.all([

            fetch(`${base}/fed/v1/inflation?limit=24&sort=date.desc`, { headers }),

            fetch(`${base}/fed/v1/labor-market?limit=24&sort=date.desc`, { headers }),

            fetch(`${base}/fed/v1/treasury-yields?limit=24&sort=date.desc`, { headers }),

            fetch(`${base}/fed/v1/inflation-expectations?limit=24&sort=date.desc`, { headers }),

            fetch(`${base}/v2/aggs/ticker/C:XAUUSD/range/1/day/2025-11-03/2030-01-01?adjusted=true&sort=desc&limit=100`, { headers }),

            fetch(`${base}/v2/aggs/ticker/USO/range/1/day/2025-11-03/2030-01-01?adjusted=true&sort=desc&limit=100`, { headers }),

            fetch(`${base}/v2/aggs/ticker/QQQ/range/1/day/2025-11-03/2030-01-01?adjusted=true&sort=desc&limit=100`, { headers })

        ]);

        const [
            inflation,
            laborMarket,
            treasuryYields,
            inflationExpectations,
            gold,
            oil,
            qqq
        ] = await Promise.all(responses.map(r => r.json()));

        output.textContent = `
========================
INFLATION
========================
${JSON.stringify(inflation, null, 2)}

========================
LABOR MARKET
========================
${JSON.stringify(laborMarket, null, 2)}

========================
TREASURY YIELDS
========================
${JSON.stringify(treasuryYields, null, 2)}

========================
INFLATION EXPECTATIONS
========================
${JSON.stringify(inflationExpectations, null, 2)}

========================
GOLD (XAUUSD)
========================
${JSON.stringify(gold, null, 2)}

========================
OIL (USO)
========================
${JSON.stringify(oil, null, 2)}

========================
QQQ
========================
${JSON.stringify(qqq, null, 2)}
`;

    } catch (err) {

        output.textContent = "Erreur :\n\n" + err;

    }

})();

</script>

</body>
</html>
